<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN — Policy Intelligence</title>
    <meta name="description" content="Meridian Technologies internal policy inquiries.">
    <!-- Distinctive, non-generic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #F5F4F0; /* Warm Alabaster */
            --bg-panel: #FFFFFF;
            --text-ink: #111111;
            --text-mute: #666666;
            --accent-brand: #E63946; /* Editorial Vermilion */
            --border-faint: #E2E0DB;
            --border-heavy: #111111;

            --font-display: 'Bodoni Moda', serif;
            --font-body: 'Epilogue', sans-serif;
            
            --spacing-unit: 8px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-canvas);
            color: var(--text-ink);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        /* Subtle textured overlay instead of generic gradients */
        .texture-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.25;
            pointer-events: none;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        /* TOP NAVIGATION */
        header {
            position: relative;
            z-index: 20;
            padding: 24px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border-heavy);
            background: var(--bg-canvas);
        }

        .brand-mark {
            font-family: var(--font-display);
            font-size: 28px;
            font-style: italic;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .brand-mark span {
            color: var(--accent-brand);
        }

        .meta-nav {
            font-family: var(--font-body);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            gap: 32px;
        }
        
        .meta-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-brand);
            border-radius: 50%;
        }

        /* FEED AREA (NO BUBBLES) */
        #manuscript {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            padding: 60px 48px 120px 48px;
            scroll-behavior: smooth;
        }

        #manuscript::-webkit-scrollbar {
            width: 8px;
        }
        #manuscript::-webkit-scrollbar-thumb {
            background: var(--border-faint);
            border-radius: 4px;
        }

        .content-width {
            max-width: 820px;
            margin: 0 auto;
        }

        /* WELCOME COVER */
        .cover-sheet {
            text-align: left;
            margin-bottom: 80px;
            animation: introFade 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes introFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cover-sheet h1 {
            font-family: var(--font-display);
            font-size: 82px;
            font-weight: 400;
            line-height: 0.95;
            letter-spacing: -2px;
            margin-bottom: 32px;
        }
        
        .cover-sheet h1 i {
            color: var(--accent-brand);
            font-weight: 600;
        }

        .cover-sheet p {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            color: var(--text-mute);
            max-width: 480px;
            line-height: 1.6;
            margin-bottom: 48px;
            padding-left: 16px;
            border-left: 2px solid var(--border-heavy);
        }

        .action-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .prompt-pill {
            background: transparent;
            border: 1px solid var(--border-faint);
            color: var(--text-ink);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .prompt-pill:hover {
            border-color: var(--border-heavy);
            background: var(--text-ink);
            color: var(--bg-canvas);
        }

        /* MESSAGE BLOCKS */
        .entry-block {
            margin-bottom: 64px;
            animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* User Query: Huge Typography (Article Headline style) */
        .entry-user {
            margin-bottom: 24px;
        }

        .query-text {
            font-family: var(--font-display);
            font-size: 42px;
            font-weight: 600;
            line-height: 1.1;
            color: var(--text-ink);
            letter-spacing: -1px;
        }
        
        .query-label {
            font-family: var(--font-body);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent-brand);
            margin-bottom: 12px;
            display: block;
            font-weight: 600;
        }

        /* System Response: Editorial Columns */
        .entry-system {
            padding-left: 32px;
            border-left: 1px solid var(--border-faint);
        }

        .response-text {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-ink);
            font-weight: 300;
        }
        
        .response-text p {
            margin-bottom: 16px;
        }
        
        .response-text strong {
            font-weight: 600;
            color: var(--text-ink);
        }
        
        /* Drop cap for first paragraph of system response */
        .response-text > p:first-of-type::first-letter {
            font-family: var(--font-display);
            font-size: 56px;
            float: left;
            line-height: 0.8;
            margin-right: 8px;
            margin-top: 4px;
            font-weight: 800;
            color: var(--accent-brand);
        }

        /* CITATION APPENDIX */
        .appendix {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 2px solid var(--border-heavy);
        }

        .appendix-title {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-mute);
            margin-bottom: 20px;
        }

        .appendix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .doc-reference {
            background: var(--bg-panel);
            border: 1px solid var(--border-faint);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: border-color 0.3s, transform 0.3s;
        }
        
        .doc-reference:hover {
            border-color: var(--border-heavy);
            transform: translateY(-2px);
        }

        .doc-name {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-ink);
            line-height: 1.2;
        }

        .doc-meta {
            font-family: var(--font-body);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-brand);
        }

        .doc-excerpt {
            font-family: var(--font-body);
            font-size: 12px;
            color: var(--text-mute);
            line-height: 1.5;
            display: none;
            padding-top: 12px;
            margin-top: 8px;
            border-top: 1px dashed var(--border-faint);
            font-style: italic;
        }

        .doc-reference.expanded .doc-excerpt {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* COMMAND BAR (INPUT) */
        .command-bar-wrapper {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 20;
            background: var(--bg-canvas);
            border-top: 1px solid var(--border-faint);
            padding: 24px 48px;
        }

        .command-form {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            align-items: stretch;
            background: var(--bg-panel);
            border: 2px solid var(--border-heavy);
            transition: box-shadow 0.3s;
        }

        .command-form:focus-within {
            box-shadow: 4px 4px 0px var(--accent-brand);
        }

        #inquiry {
            flex: 1;
            appearance: none;
            background: transparent;
            border: none;
            outline: none;
            padding: 20px 24px;
            font-family: var(--font-body);
            font-size: 18px;
            color: var(--text-ink);
            resize: none;
            height: 64px;
            line-height: 24px;
        }

        #inquiry::placeholder {
            color: var(--text-mute);
            font-weight: 300;
        }

        .execute-btn {
            background: var(--border-heavy);
            color: var(--bg-canvas);
            border: none;
            width: 80px;
            font-family: var(--font-display);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }

        .execute-btn:hover:not(:disabled) {
            background: var(--accent-brand);
            color: var(--bg-panel);
        }
        
        .execute-btn:disabled {
            background: var(--border-faint);
            cursor: not-allowed;
        }

        /* THINKING INDICATOR */
        .typesetting-flash {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-brand);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 24px 0;
        }

        .typesetting-flash::after {
            content: '';
            width: 40px;
            height: 1px;
            background: var(--accent-brand);
            animation: stretchLine 1s infinite alternate;
        }
        
        @keyframes stretchLine {
            0% { width: 10px; }
            100% { width: 60px; }
        }

        @media (max-width: 768px) {
            header { padding: 16px 24px; }
            #manuscript { padding: 40px 24px 100px 24px; }
            .cover-sheet h1 { font-size: 56px; }
            .query-text { font-size: 32px; }
            .command-bar-wrapper { padding: 16px 24px; }
            .meta-nav { display: none; }
        }
    </style>
</head>
<body>
    <div class="texture-layer"></div>

    <header>
        <div class="brand-mark">M<span>.</span></div>
        <div class="meta-nav">
            <div>Intelligence Div.</div>
            <div class="meta-status">System Operational</div>
        </div>
    </header>

    <div id="manuscript">
        <div class="content-width">
            <div class="cover-sheet" id="cover-sheet">
                <h1>Policy <br><i>Intelligence.</i></h1>
                <p>An authoritative resource for Meridian Technologies protocol, culture, and procedural mandates. Submit an inquiry below to examine the archives.</p>
                <div class="action-prompts">
                    <button class="prompt-pill" onclick="invoke(this)">PTO Architecture</button>
                    <button class="prompt-pill" onclick="invoke(this)">Remote Directives</button>
                    <button class="prompt-pill" onclick="invoke(this)">Security Protocol</button>
                </div>
            </div>
            
            <div id="feed-root"></div>
        </div>
    </div>

    <div class="command-bar-wrapper">
        <div class="command-form">
            <textarea
                id="inquiry"
                placeholder="Declare your inquiry..."
                rows="1"
                autofocus
            ></textarea>
            <button class="execute-btn" id="execute-btn" onclick="transmit()" title="Transmit">
                →
            </button>
        </div>
    </div>

    <script>
        const scrollPlane = document.getElementById('manuscript');
        const feedRoot = document.getElementById('feed-root');
        const inquiryInput = document.getElementById('inquiry');
        const transmitBtn = document.getElementById('execute-btn');
        const cover = document.getElementById('cover-sheet');
        let processing = false;

        // Auto-sizing textarea (limited to 1 line, expands a bit if needed)
        inquiryInput.addEventListener('input', () => {
            inquiryInput.style.height = '64px';
            inquiryInput.style.height = Math.min(Math.max(inquiryInput.scrollHeight, 64), 120) + 'px';
        });

        inquiryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmit();
            }
        });

        function invoke(btn) {
            inquiryInput.value = btn.textContent;
            transmit();
        }

        function createMarkup(text) {
            // Rough markdown parse for bold and paragraphs
            let paragraphs = text.split('\n\n').filter(p => p.trim());
            let html = paragraphs.map(p => {
                let formatted = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                return `<p>${formatted}</p>`;
            }).join('');
            return html;
        }

        function buildEntry(role, txt, refs) {
            if (cover) cover.style.display = 'none';

            const block = document.createElement('div');
            block.className = 'entry-block';

            if (role === 'user') {
                block.innerHTML = `
                    <div class="entry-user">
                        <span class="query-label">Inquiry Submitted</span>
                        <div class="query-text">${escapeHTML(txt)}</div>
                    </div>
                `;
            } else {
                let contentHTML = `
                    <div class="entry-system">
                        <div class="response-text">${createMarkup(txt)}</div>
                `;

                if (refs && refs.length > 0) {
                    let refGrid = `<div class="appendix">
                        <div class="appendix-title">Reference Appendix</div>
                        <div class="appendix-grid">`;
                    
                    refs.forEach(r => {
                        refGrid += `
                            <div class="doc-reference" onclick="this.classList.toggle('expanded')">
                                <div class="doc-name">${escapeHTML(r.document || 'Unfiled')}</div>
                                <div class="doc-meta">${escapeHTML(r.section || 'General')}</div>
                                ${r.snippet ? `<div class="doc-excerpt">${escapeHTML(r.snippet)}</div>` : ''}
                            </div>
                        `;
                    });
                    
                    refGrid += `</div></div>`;
                    contentHTML += refGrid;
                }

                contentHTML += `</div>`;
                block.innerHTML = contentHTML;
            }

            return block;
        }

        function showProcessing() {
            const block = document.createElement('div');
            block.className = 'entry-block system-processing';
            block.innerHTML = `<div class="typesetting-flash">Extracting Archives</div>`;
            feedRoot.appendChild(block);
            scrollToBottom();
            return block;
        }

        async function transmit() {
            const payload = inquiryInput.value.trim();
            if (!payload || processing) return;

            processing = true;
            transmitBtn.disabled = true;
            inquiryInput.value = '';
            inquiryInput.style.height = '64px';

            feedRoot.appendChild(buildEntry('user', payload));
            const loader = showProcessing();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: payload })
                });

                const data = await res.json();
                loader.remove();

                if (data.error) {
                    feedRoot.appendChild(buildEntry('system', `System Fault: ${data.error}`));
                } else {
                    feedRoot.appendChild(buildEntry('system', data.answer, data.citations));
                }
            } catch (err) {
                loader.remove();
                feedRoot.appendChild(buildEntry('system', `Network Failure: ${err.message}`));
            } finally {
                processing = false;
                transmitBtn.disabled = false;
                inquiryInput.focus();
                scrollToBottom();
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function scrollToBottom() {
            scrollPlane.scrollTop = scrollPlane.scrollHeight;
        }
    </script>
</body>
</html>
