services:
  - type: web
    name: insight-rag
    env: python
    buildCommand: "pip install -r requirements.txt && python -m app.rag.ingest"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
